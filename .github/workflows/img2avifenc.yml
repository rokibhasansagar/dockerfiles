name: img2avifenc

on:
  workflow_dispatch:
    inputs:
      jobType:
        description: 'Select Job to Run'
        required: true
        default: 'build'
        type: choice
        options:
          - build
          - test
          - all
  push:
    branches: [ "main" ]
    paths:
      - 'img2avifenc/Dockerfile'
      - '.github/workflows/img2avifenc.yml'

env:
  REGISTRY: "${{ vars.REGISTRY }}"  # "ghcr.io"
  IMAGE_NAME: "${{ github.repository_owner }}/img2avifenc"
  RCLONE_CONFIG_HASH: ${{ secrets.RCLONE_CONFIG_HASH }}

jobs:

  build:
    runs-on: ubuntu-latest
    # Run if:
    # 1. It is a Push event
    # 2. OR Dispatch is 'build'
    # 3. OR Dispatch is 'all'
    if: ${{ github.event_name == 'push' || github.event.inputs.jobType == 'build' || github.event.inputs.jobType == 'all' }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: 'v3.0.2'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          allow: security.insecure
          context: img2avifenc
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            RCLONE_CONFIG_HASH=${{ env.RCLONE_CONFIG_HASH }}

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  test:
    runs-on: ubuntu-latest
    needs: build
    # Logic Explanation:
    # !cancelled() -> Ensures this runs even if 'build' was skipped (e.g. in 'test' only mode)
    # AND (
    #   (Push Event AND Build Success) -> Normal CI flow
    #   OR (Dispatch 'all' AND Build Success) -> Manual full flow
    #   OR (Dispatch 'test') -> Manual test only (Build skipped/ignored)
    # )
    if: >-
      ${{ 
        !cancelled() && 
        (
          (github.event_name == 'push' && needs.build.result == 'success') || 
          (github.event.inputs.jobType == 'all' && needs.build.result == 'success') || 
          (github.event.inputs.jobType == 'test')
        ) 
      }}

    # We define the container here dynamically using the top-level env vars
    container:
      image: ${{ vars.REGISTRY }}/rokibhasansagar/img2avifenc:latest
      volumes:
        - tmp:/data

    steps:
      - name: Check Environment
        run: |
          command -v avifenc || true
          avifenc --help

      - name: Run Test Workload
        run: |
          set -x
          cd /data
          # Download sample
          curl -sL "https://github.blog/wp-content/uploads/2025/12/527215072-2cd64986-d18e-4a0f-a6f6-fbac2b4d7555.jpg?w=1536" -o input.jpg && echo

          # Run encode loop
          for qual in 36 45 50 60; do
            avifenc -q ${qual} --speed 0 --codec ${codec:-aom} --depth 12 --cicp 1/13/1 -a sb-size=64 -a tune=iq --output output_q${qual}.avif input.jpg 1>/dev/null
            # Upload result
            curl -s -F "file=@output_q${qual}.avif" https://temp.sh/upload && echo
          done

          # Verify files
          ls -lAog /data
          md5sum /data/*.avif

